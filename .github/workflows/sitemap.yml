name: Generate XML Sitemap

on:
  push:
    branches:
      - main  # Runs every time you push code to main

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to get accurate 'lastmod' dates from git history

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://yourwebsite.com/ # Change to your actual domain

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff-index --quiet HEAD || git commit -m "chore: auto-update sitemap.xml"
          git push
